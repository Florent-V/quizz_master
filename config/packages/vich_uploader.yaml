vich_uploader:
    db_driver: orm
    metadata:
        type: attribute

    mappings:
        product_image:
            uri_prefix: /uploads/images/products
            upload_destination: '%kernel.project_dir%/public/uploads/images/products'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
        profil_image:
            uri_prefix: /uploads/images/profiles
            upload_destination: '%kernel.project_dir%/public/uploads/images/profiles'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

