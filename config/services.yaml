# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Locale par défaut de l'application, utilisée par Gedmo Translatable comme langue source
    locale: 'fr' # ou '%env(APP_DEFAULT_LOCALE)%' si vous utilisez une variable d'environnement

    # Liste des locales supportées par l'application (pour les routes, le sélecteur de langue front, etc.)
    # Cette liste peut inclure la langue par défaut.
    app_locales: [ 'fr', 'en', 'es' ] # Exemple

    # target_translation_locales est maintenant géré par src/Enum/TargetLanguage.php

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # Configure the Gemini Client
    Gemini\Client:
        factory: ['Gemini', 'client']
        arguments:
            - '%env(GEMINI_API_KEY)%'

    # Make sure our service uses the client
    App\Service\AIQuizGeneratorService:
        autowire: true

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # Automatically tags all classes that implement the interface.
    _instanceof:
        App\Quiz\Service\AnswerCreation\AnswerCreationStrategyInterface:
            tags: ['app.answer_creation_policy']

        App\Quiz\Service\FinishQuiz\FinishQuizStrategyInterface:
            tags: [ 'app.finish_quiz_strategy' ]

        App\Service\ImageGeneration\ImageGeneratorInterface:
            tags: [ 'app.image_generator' ]

    # This injects all services tagged with 'app.answer_creation_policy'
    # into the constructor of the manager service.
    App\Quiz\Service\AnswerCreation\AnswerCreationStrategyRegistry:
        arguments:
            $strategies: !tagged_iterator app.answer_creation_policy

    App\Quiz\Service\FinishQuiz\FinishQuizStrategyRegistry:
        arguments:
            $strategies: !tagged_iterator app.finish_quiz_strategy

    App\Service\ImageGeneration\ImageGeneratorRegistry:
        arguments:
            $generators: !tagged_iterator app.image_generator

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\Serializer\QuestionNormalizer:
        arguments:
            $normalizer: '@serializer.normalizer.object'
            $imageHelper: '@App\Serializer\ImageUrlHelper'
        tags:
            - { name: 'serializer.normalizer', priority: 10 }

    App\Serializer\ProposalNormalizer:
        arguments:
            $normalizer: '@serializer.normalizer.object'
            $imageHelper: '@App\Serializer\ImageUrlHelper'
        tags:
            - { name: 'serializer.normalizer', priority: 10 }

    Gedmo\Translatable\TranslatableListener:
        alias: stof_doctrine_extensions.listener.translatable

    # Configuration pour le service Mistral AI
    App\Service\MistralApiService:
        arguments:
            $mistralApiKey: '%env(MISTRAL_API_KEY)%'
            $mistralAgentId: '%env(MISTRAL_AGENT_ID)%'

    # Configuration des générateurs d'images
    App\Service\ImageGeneration\MistralImageGenerator:
        arguments:
            $mistralApiKey: '%env(MISTRAL_API_KEY)%'

    App\Service\ImageGeneration\GeminiImageGenerator:
        arguments:
            $geminiApiKey: '%env(GEMINI_API_KEY)%'
