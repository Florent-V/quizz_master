# This is a basic workflow to help you get started with Actions
name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ dev, develop, prod, main ]
  pull_request:
    branches: [ dev, develop, prod, main ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  code-quality:
    # The type of runner that the job will run on
    name: Code Quality Checks
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: mbstring, intl, xdebug
          coverage: xdebug

      - name: 🔧 Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: checks_directory
        run: |
          if [ -d "./.idea" ]; then echo "Forbidden PHPStorm folder (.idea/) found ! Please, ignore in .gitignore"; exit 2; fi
          if [ -d "./.vscode" ]; then echo "Forbidden VScode folder (.vscode) found ! Please, ignore in .gitignore"; exit 2; fi
          if [ $(find ./ -name .DS_Store) ]; then echo "Forbidden MacOS boring file (.DS_Store) found ! Please, ignore in .gitignore"; exit 2; fi
          if [ -d "./vendor" ]; then echo "Forbidden external libs folder (vendor/) found !"; exit 2; fi

      - name: 🏗️ Install dependencies (PHP)
        run: composer install --no-progress --prefer-dist

      - name: 📦 Install dependencies (JS)
        run: npm install

      - name: 🔍 Run PHP Code Sniffer (PSR-12)
        run: vendor/bin/phpcs --standard=PSR12 src/

      - name: 🔧 Run PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: 🔎 Run PHPStan
        run: vendor/bin/phpstan analyse src --xdebug --level 6

      - name: 🛠️ Run PHP Mess Detector
        run: vendor/bin/phpmd src text phpmd.xml

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🔍 Run GrumPHP (orchestration)
        run: php ./vendor/bin/grumphp run

#      - name: phpunit
#        run: bin/phpunit

